{#
  Project PI Management panel — Admin only.
  Dedicated view for managing global/project-level project_pi grants.
#}
<div id="panel-project-pi">

  {# Header #}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">
      <i class="fa-solid fa-user-tie me-2 text-secondary"></i>Project PIs
    </h5>
    <div class="d-flex gap-2 align-items-center">
      <div class="form-check form-switch mb-0">
        <input class="form-check-input" type="checkbox" id="ppi-show-inactive" role="switch">
        <label class="form-check-label small text-muted" for="ppi-show-inactive">Show inactive</label>
      </div>
      <button class="btn btn-sm btn-primary" id="ppi-show-form-btn">
        <i class="fa-solid fa-plus me-1"></i>Assign Project PI
      </button>
    </div>
  </div>

  {# Inline form for assignment #}
  <div id="ppi-form-container" class="card mb-4 d-none">
    <div class="card-body">
      <h6 class="card-title mb-3">Assign Project PI</h6>
      <div class="row g-2 align-items-start">
        <div class="col-sm-6">
          <label class="form-label small mb-1">User <span class="text-danger">*</span></label>
          <div class="input-group input-group-sm">
            <input type="text" id="ppi-user-search" class="form-control" placeholder="Search by email or name…" autocomplete="off">
            <button class="btn btn-outline-secondary" type="button" id="ppi-user-search-btn">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
          <div id="ppi-user-results" class="list-group mt-1 d-none" style="max-height:160px;overflow-y:auto;position:absolute;z-index:10;width:95%;"></div>
          <input type="hidden" id="ppi-user-id">
          <div id="ppi-selected-user" class="mt-1 small text-success d-none">
            <i class="fa-solid fa-circle-check me-1"></i><span id="ppi-selected-user-label"></span>
            <a href="#" id="ppi-clear-user" class="ms-2 text-secondary small">change</a>
          </div>
        </div>
        <div class="col-sm-6">
          <label class="form-label small mb-1">Project <span class="text-danger">*</span></label>
          <select id="ppi-project-select" class="form-select form-select-sm">
            <option value="">Loading projects…</option>
          </select>
        </div>
      </div>
      <div class="row g-2 mt-2">
        <div class="col-12 d-flex justify-content-end gap-2">
          <button class="btn btn-sm btn-outline-secondary" id="ppi-cancel-btn">Cancel</button>
          <button class="btn btn-sm btn-success" id="ppi-submit-btn">
            <i class="fa-solid fa-check me-1"></i>Assign
          </button>
        </div>
      </div>
      <div id="ppi-form-error" class="text-danger small mt-2"></div>
    </div>
  </div>

  {# Toggle confirmation modal #}
  <div class="modal fade" id="ppi-toggle-modal" tabindex="-1" aria-labelledby="ppi-toggle-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title" id="ppi-toggle-modal-label"></h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body small py-3" id="ppi-toggle-modal-body"></div>
        <div class="modal-footer py-2">
          <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-sm btn-danger" id="ppi-toggle-confirm-btn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  {# Table — filled by JS #}
  <div id="ppi-table-wrap"></div>

</div>

<script>
(function () {
  'use strict';

  function csrf() { return window._adminCsrf || ''; }

  function apiJson(url, method, body) {
    var m = method || 'GET';
    var headers = { 'X-CSRFToken': csrf() };
    if (body) headers['Content-Type'] = 'application/json';
    return fetch(url, {
      method: m, headers: headers,
      body: body ? JSON.stringify(body) : undefined,
    }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── state & render ────────────────────────────────────────────────────────

  var _grants = [];

  function loadGrants() {
    var wrap = document.getElementById('ppi-table-wrap');
    wrap.innerHTML = '<div class="text-center text-muted py-4 small"><i class="fa-solid fa-spinner fa-spin me-1"></i>Loading…</div>';
    
    apiJson('/admin/api/access-grants?role=project_pi').then(function (res) {
      if (!res.ok) {
        wrap.innerHTML = '<div class="alert alert-danger small py-2">' + esc(res.data.error || 'Failed to load.') + '</div>';
        return;
      }
      _grants = res.data.grants || [];
      renderTable(document.getElementById('ppi-show-inactive').checked);
    }).catch(function () {
      wrap.innerHTML = '<div class="alert alert-danger small py-2">Network error.</div>';
    });
  }

  function renderTable(showInactive) {
    var wrap = document.getElementById('ppi-table-wrap');
    var visible = showInactive ? _grants : _grants.filter(function (g) { return g.status === 'active'; });
    
    if (!visible.length) {
      wrap.innerHTML = '<p class="text-muted small text-center py-3">No Project PI grants found.</p>';
      return;
    }
    
    var rows = visible.map(function (g) {
      var isActive = g.status === 'active';
      var toggleBtn = '<button class="btn btn-sm py-0 px-2 ppi-toggle-btn '
        + (isActive ? 'btn-outline-danger' : 'btn-outline-success') + '"'
        + ' data-id="' + esc(g.grant_id) + '"'
        + ' data-email="' + esc(g.user_email) + '"'
        + ' data-project="' + esc(g.project_id) + '"'
        + ' data-active="' + (isActive ? '1' : '0') + '"'
        + ' title="' + (isActive ? 'Deactivate' : 'Activate') + '">'
        + '<i class="fa-solid ' + (isActive ? 'fa-toggle-on' : 'fa-toggle-off') + '"></i>'
        + '</button>';
        
      return '<tr class="' + (isActive ? '' : 'text-muted') + '">'
        + '<td class="align-middle py-2">'
        +   '<div class="fw-semibold small">' + esc(g.user_name) + '</div>'
        +   '<div class="small text-muted">' + esc(g.user_email) + '</div>'
        + '</td>'
        + '<td class="align-middle py-2 small fw-semibold">' + esc(g.project_id) + '</td>'
        + '<td class="align-middle py-2 small">' + esc(g.notes || '') + '</td>'
        + '<td class="align-middle py-2">'
        + (isActive
            ? '<span class="badge text-bg-success">Active</span>'
            : '<span class="badge text-bg-secondary">Inactive</span>')
        + '</td>'
        + '<td class="align-middle py-2 text-end">' + toggleBtn + '</td>'
        + '</tr>';
    }).join('');
    
    wrap.innerHTML = '<div class="table-responsive"><table class="table table-sm table-hover align-middle mb-0">'
      + '<thead class="table-light"><tr>'
      + '<th class="fw-medium small text-muted">User</th>'
      + '<th class="fw-medium small text-muted" style="width:20%;">Project ID</th>'
      + '<th class="fw-medium small text-muted" style="width:30%;">Notes</th>'
      + '<th class="fw-medium small text-muted" style="width:10%;">Status</th>'
      + '<th class="fw-medium small text-muted text-end" style="width:10%;">Actions</th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table></div>';
      
    var toggleBtns = wrap.querySelectorAll('.ppi-toggle-btn');
    for (var i = 0; i < toggleBtns.length; i++) {
      toggleBtns[i].addEventListener('click', function() {
        promptToggle(this.getAttribute('data-id'), this.getAttribute('data-email'), this.getAttribute('data-project'), this.getAttribute('data-active') === '1');
      });
    }
  }

  document.getElementById('ppi-show-inactive').addEventListener('change', function () {
    renderTable(this.checked);
  });

  // ── toggle modal ──────────────────────────────────────────────────────────

  var _pendingToggleId = null;
  var _toggleModal = null;

  function promptToggle(grantId, email, projectId, isActive) {
    var action = isActive ? 'Deactivate' : 'Activate';
    var color  = isActive ? 'text-danger' : 'text-success';
    document.getElementById('ppi-toggle-modal-label').innerHTML =
      '<i class="fa-solid fa-toggle-' + (isActive ? 'off' : 'on') + ' ' + color + ' me-2"></i>' + action + ' Project PI';
    
    var body = action + ' Project PI access for <strong>' + esc(email) + '</strong> on project <strong>' + esc(projectId) + '</strong>?';
    if (isActive) {
      body += '<div class="text-danger small mt-2"><i class="fa-solid fa-triangle-exclamation me-1"></i>'
        + 'User will no longer have access to manage this project.</div>';
    }
    
    document.getElementById('ppi-toggle-modal-body').innerHTML = body;
    var confirmBtn = document.getElementById('ppi-toggle-confirm-btn');
    confirmBtn.className = 'btn btn-sm ' + (isActive ? 'btn-danger' : 'btn-success');
    confirmBtn.textContent = action;
    
    _pendingToggleId = grantId;
    if (!_toggleModal) _toggleModal = new bootstrap.Modal(document.getElementById('ppi-toggle-modal'));
    _toggleModal.show();
  }

  document.getElementById('ppi-toggle-confirm-btn').addEventListener('click', function () {
    if (!_pendingToggleId) return;
    var grantId = _pendingToggleId;
    _pendingToggleId = null;
    _toggleModal.hide();
    
    var btn = this;
    btn.disabled = true;
    apiJson('/admin/api/access-grants/' + encodeURIComponent(grantId) + '/toggle', 'POST').then(function (res) {
      btn.disabled = false;
      if (!res.ok) { 
        var wrap = document.getElementById('ppi-table-wrap');
        wrap.insertAdjacentHTML('afterbegin', '<div class="alert alert-danger small py-2 mt-2">' + esc(res.data.error || 'Failed.') + '</div>');
        return; 
      }
      var newStatus = res.data.status;
      _grants = _grants.map(function (g) {
        return g.grant_id === grantId ? Object.assign({}, g, { status: newStatus }) : g;
      });
      renderTable(document.getElementById('ppi-show-inactive').checked);
    }).catch(function () { btn.disabled = false; });
  });

  // ── form handling ─────────────────────────────────────────────────────────

  var formContainer = document.getElementById('ppi-form-container');
  var userSearchInput = document.getElementById('ppi-user-search');
  var userResultsBox = document.getElementById('ppi-user-results');
  var hiddenUserId = document.getElementById('ppi-user-id');
  var selectedUserBox = document.getElementById('ppi-selected-user');
  var selectedUserLabel = document.getElementById('ppi-selected-user-label');
  var projectSelect = document.getElementById('ppi-project-select');
  var errEl = document.getElementById('ppi-form-error');

  function loadProjects() {
    apiJson('/admin/api/projects?master=1').then(function (res) {
      if (!res.ok) return;
      var active = (res.data.projects || []).filter(function(p) { return p.status === 'active'; });
      projectSelect.innerHTML = '<option value="">— select project —</option>' + 
        active.map(function(p) {
          return '<option value="' + esc(p.project_id) + '">' + esc(p.project_id) + ' — ' + esc(p.project_name) + '</option>';
        }).join('');
    });
  }

  document.getElementById('ppi-show-form-btn').addEventListener('click', function () {
    resetForm();
    formContainer.classList.remove('d-none');
    userSearchInput.focus();
    if (projectSelect.options.length <= 1) loadProjects();
  });

  document.getElementById('ppi-cancel-btn').addEventListener('click', function () {
    formContainer.classList.add('d-none');
    resetForm();
  });

  function resetForm() {
    errEl.textContent = '';
    clearUserSelection();
    projectSelect.value = '';
  }

  // User search logic
  var _userSearchTimer;
  userSearchInput.addEventListener('input', function () {
    clearTimeout(_userSearchTimer);
    var q = this.value.trim();
    if (q.length < 2) { userResultsBox.classList.add('d-none'); return; }
    _userSearchTimer = setTimeout(function () { doUserSearch(q); }, 300);
  });
  
  document.getElementById('ppi-user-search-btn').addEventListener('click', function () {
    var q = userSearchInput.value.trim();
    if (q.length >= 2) doUserSearch(q);
  });

  function doUserSearch(query) {
    userResultsBox.innerHTML = '<div class="list-group-item small text-muted text-center py-2"><i class="fa-solid fa-spinner fa-spin"></i> Searching…</div>';
    userResultsBox.classList.remove('d-none');
    apiJson('/admin/api/users?query=' + encodeURIComponent(query)).then(function (res) {
      if (!res.ok) { userResultsBox.classList.add('d-none'); return; }
      var users = res.data.users || [];
      if (!users.length) {
        userResultsBox.innerHTML = '<div class="list-group-item small text-muted py-2">No users found.</div>';
        return;
      }
      userResultsBox.innerHTML = users.map(function (u) {
        return '<button type="button" class="list-group-item list-group-item-action py-1 px-2 small ppi-user-option"'
             + ' data-id="' + esc(u.user_id) + '" data-label="' + esc(u.name + ' (' + u.email + ')') + '">'
             + '<div class="fw-medium">' + esc(u.name) + '</div>'
             + '<div class="text-muted" style="font-size:0.8em;">' + esc(u.email) + '</div>'
             + '</button>';
      }).join('');
      
      var options = userResultsBox.querySelectorAll('.ppi-user-option');
      for (var i=0; i<options.length; i++) {
        options[i].addEventListener('click', function () { selectUser(this.dataset.id, this.dataset.label); });
      }
    });
  }

  function selectUser(id, label) {
    hiddenUserId.value = id;
    selectedUserLabel.textContent = label;
    userSearchInput.value = '';
    userSearchInput.closest('.input-group').classList.add('d-none');
    userResultsBox.classList.add('d-none');
    selectedUserBox.classList.remove('d-none');
    projectSelect.focus();
  }

  function clearUserSelection() {
    hiddenUserId.value = '';
    selectedUserLabel.textContent = '';
    selectedUserBox.classList.add('d-none');
    userSearchInput.closest('.input-group').classList.remove('d-none');
    userSearchInput.value = '';
    userResultsBox.classList.add('d-none');
  }

  document.getElementById('ppi-clear-user').addEventListener('click', function (e) {
    e.preventDefault();
    clearUserSelection();
    userSearchInput.focus();
  });

  // Submit logic
  document.getElementById('ppi-submit-btn').addEventListener('click', function () {
    errEl.textContent = '';
    
    var userId = hiddenUserId.value;
    var projectId = projectSelect.value;
    
    if (!userId) { errEl.textContent = 'Please select a user.'; return; }
    if (!projectId) { errEl.textContent = 'Please select a project.'; return; }

    var data = {
      user_id: userId,
      role: 'project_pi',
      scope_type: 'project',
      project_id: projectId,
      notes: 'Assigned via Admin Console'
    };

    var btn = this;
    btn.disabled = true;
    apiJson('/admin/api/access-grants', 'POST', data).then(function (res) {
      btn.disabled = false;
      if (!res.ok) { errEl.textContent = res.data.error || 'Failed to assign grant.'; return; }
      formContainer.classList.add('d-none');
      loadGrants();
    }).catch(function () { 
      btn.disabled = false; 
      errEl.textContent = 'Network error.'; 
    });
  });

  // ── init ──────────────────────────────────────────────────────────────────

  loadGrants();

}());
</script>
