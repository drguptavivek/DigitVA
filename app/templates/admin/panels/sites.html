{#
  Site Master Management panel
  Lists all sites with edit, create, and toggle capabilities.
#}
<div id="panel-sites">

  {# Header #}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">
      <i class="fa-solid fa-building me-2 text-secondary"></i>Sites
    </h5>
    <div class="d-flex gap-2 align-items-center">
      <div class="form-check form-switch mb-0">
        <input class="form-check-input" type="checkbox" id="site-show-inactive" role="switch">
        <label class="form-check-label small text-muted" for="site-show-inactive">Show inactive</label>
      </div>
      <button class="btn btn-sm btn-primary" id="site-show-form-btn">
        <i class="fa-solid fa-plus me-1"></i>New Site
      </button>
    </div>
  </div>

  {# Inline form for create / edit #}
  <div id="site-form-container" class="card mb-4 d-none">
    <div class="card-body">
      <h6 class="card-title mb-3" id="site-form-title">Create Site</h6>
      <div class="row g-2 align-items-start">
        <div class="col-sm-2">
          <label class="form-label small mb-1">Site ID <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm" id="site-id-input" placeholder="e.g. AA01" maxlength="4" style="text-transform: uppercase;">
        </div>
        <div class="col-sm-4">
          <label class="form-label small mb-1">Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm" id="site-name-input" placeholder="e.g. Test Site">
        </div>
        <div class="col-sm-2">
          <label class="form-label small mb-1">Abbr <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm" id="site-abbr-input" placeholder="e.g. TS">
        </div>
        <div class="col-sm-2">
          <label class="form-label small mb-1">Status</label>
          <select class="form-select form-select-sm" id="site-status-input">
            <option value="active">Active</option>
            <option value="deactive">Inactive</option>
          </select>
        </div>
        <div class="col-sm-2 d-flex align-items-end mb-1">
          <div class="d-flex gap-2 w-100">
            <button class="btn btn-sm btn-success flex-grow-1" id="site-submit-btn">
              <i class="fa-solid fa-check me-1"></i>Save
            </button>
            <button class="btn btn-sm btn-outline-secondary" id="site-cancel-btn">Cancel</button>
          </div>
        </div>
      </div>
      <div id="site-form-error" class="text-danger small mt-2"></div>
    </div>
  </div>

  {# Toggle confirmation modal #}
  <div class="modal fade" id="site-toggle-modal" tabindex="-1" aria-labelledby="site-toggle-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title" id="site-toggle-modal-label"></h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body small py-3" id="site-toggle-modal-body"></div>
        <div class="modal-footer py-2">
          <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-sm btn-danger" id="site-toggle-confirm-btn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  {# Table — filled by JS #}
  <div id="site-table-wrap"></div>

</div>

<script>
(function () {
  'use strict';

  function csrf() { return window._adminCsrf || ''; }

  function apiJson(url, method, body) {
    var m = method || 'GET';
    var headers = { 'X-CSRFToken': csrf() };
    if (body) headers['Content-Type'] = 'application/json';
    return fetch(url, {
      method: m, headers: headers,
      body: body ? JSON.stringify(body) : undefined,
    }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── state & render ────────────────────────────────────────────────────────

  var _sites = [];
  var _editingId = null;

  function loadSites() {
    var wrap = document.getElementById('site-table-wrap');
    wrap.innerHTML = '<div class="text-center text-muted py-4 small"><i class="fa-solid fa-spinner fa-spin me-1"></i>Loading…</div>';
    
    var showInactive = document.getElementById('site-show-inactive').checked;
    apiJson('/admin/api/sites?master=1&include_inactive=1').then(function (res) {
      if (!res.ok) {
        wrap.innerHTML = '<div class="alert alert-danger small py-2">' + esc(res.data.error || 'Failed to load.') + '</div>';
        return;
      }
      _sites = res.data.sites || [];
      renderTable(showInactive);
    }).catch(function () {
      wrap.innerHTML = '<div class="alert alert-danger small py-2">Network error.</div>';
    });
  }

  function renderTable(showInactive) {
    var wrap = document.getElementById('site-table-wrap');
    var visible = showInactive ? _sites : _sites.filter(function (s) { return s.status === 'active'; });
    if (!visible.length) {
      wrap.innerHTML = '<p class="text-muted small text-center py-3">No sites found.</p>';
      return;
    }
    
    var rows = visible.map(function (s) {
      var isActive = s.status === 'active';
      var toggleBtn = '<button class="btn btn-sm py-0 px-2 site-toggle-btn '
        + (isActive ? 'btn-outline-danger' : 'btn-outline-success') + '"'
        + ' data-id="' + esc(s.site_id) + '"'
        + ' data-name="' + esc(s.site_name) + '"'
        + ' data-active="' + (isActive ? '1' : '0') + '"'
        + ' title="' + (isActive ? 'Deactivate' : 'Activate') + '">'
        + '<i class="fa-solid ' + (isActive ? 'fa-toggle-on' : 'fa-toggle-off') + '"></i>'
        + '</button>';
      var editBtn = '<button class="btn btn-sm py-0 px-2 btn-outline-primary site-edit-btn" '
        + ' data-id="' + esc(s.site_id) + '" title="Edit">'
        + '<i class="fa-solid fa-pen"></i></button>';
        
      return '<tr class="' + (isActive ? '' : 'text-muted') + '">'
        + '<td class="align-middle py-2"><span class="fw-semibold small">' + esc(s.site_id) + '</span></td>'
        + '<td class="align-middle py-2 small">' + esc(s.site_name) + '</td>'
        + '<td class="align-middle py-2 small">' + esc(s.site_abbr) + '</td>'
        + '<td class="align-middle py-2">'
        + (isActive
            ? '<span class="badge text-bg-success">Active</span>'
            : '<span class="badge text-bg-secondary">Inactive</span>')
        + '</td>'
        + '<td class="align-middle py-2 text-end">' + toggleBtn + ' ' + editBtn + '</td>'
        + '</tr>';
    }).join('');
    
    wrap.innerHTML = '<div class="table-responsive"><table class="table table-sm table-hover align-middle mb-0">'
      + '<thead class="table-light"><tr>'
      + '<th class="fw-medium small text-muted" style="width:15%;">Site ID</th>'
      + '<th class="fw-medium small text-muted">Name</th>'
      + '<th class="fw-medium small text-muted" style="width:20%;">Abbreviation</th>'
      + '<th class="fw-medium small text-muted" style="width:15%;">Status</th>'
      + '<th class="fw-medium small text-muted text-end" style="width:15%;">Actions</th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table></div>';
      
    // Bind edit buttons
    var editBtns = wrap.querySelectorAll('.site-edit-btn');
    for (var i = 0; i < editBtns.length; i++) {
      editBtns[i].addEventListener('click', function() {
        var id = this.getAttribute('data-id');
        openEditForm(id);
      });
    }

    // Bind toggle buttons
    var toggleBtns = wrap.querySelectorAll('.site-toggle-btn');
    for (var j = 0; j < toggleBtns.length; j++) {
      toggleBtns[j].addEventListener('click', function() {
        promptToggle(this.getAttribute('data-id'), this.getAttribute('data-name'), this.getAttribute('data-active') === '1');
      });
    }
  }

  document.getElementById('site-show-inactive').addEventListener('change', function () {
    renderTable(this.checked);
  });

  // ── toggle modal ──────────────────────────────────────────────────────────

  var _pendingToggleId = null;
  var _toggleModal = null;

  function promptToggle(siteId, siteName, isActive) {
    var action = isActive ? 'Deactivate' : 'Activate';
    var color  = isActive ? 'text-danger' : 'text-success';
    document.getElementById('site-toggle-modal-label').innerHTML =
      '<i class="fa-solid fa-toggle-' + (isActive ? 'off' : 'on') + ' ' + color + ' me-2"></i>' + action + ' Site';
    var body = action + ' <strong>' + esc(siteId) + ' — ' + esc(siteName) + '</strong>?';
    if (isActive) {
      body += '<div class="text-danger small mt-2"><i class="fa-solid fa-triangle-exclamation me-1"></i>'
        + 'Grants and mappings scoped to this site will stop resolving.</div>';
    }
    document.getElementById('site-toggle-modal-body').innerHTML = body;
    var confirmBtn = document.getElementById('site-toggle-confirm-btn');
    confirmBtn.className = 'btn btn-sm ' + (isActive ? 'btn-danger' : 'btn-success');
    confirmBtn.textContent = action;
    _pendingToggleId = siteId;
    if (!_toggleModal) _toggleModal = new bootstrap.Modal(document.getElementById('site-toggle-modal'));
    _toggleModal.show();
  }

  document.getElementById('site-toggle-confirm-btn').addEventListener('click', function () {
    if (!_pendingToggleId) return;
    var siteId = _pendingToggleId;
    _pendingToggleId = null;
    _toggleModal.hide();
    var btn = this;
    btn.disabled = true;
    apiJson('/admin/api/sites/' + encodeURIComponent(siteId) + '/toggle', 'POST').then(function (res) {
      btn.disabled = false;
      if (!res.ok) { 
        var wrap = document.getElementById('site-table-wrap');
        wrap.insertAdjacentHTML('afterbegin', '<div class="alert alert-danger small py-2 mt-2">' + esc(res.data.error || 'Failed.') + '</div>');
        return; 
      }
      var newStatus = res.data.status;
      _sites = _sites.map(function (s) {
        return s.site_id === siteId ? Object.assign({}, s, { status: newStatus }) : s;
      });
      renderTable(document.getElementById('site-show-inactive').checked);
    }).catch(function () { btn.disabled = false; });
  });

  // ── form handling ─────────────────────────────────────────────────────────

  var formContainer = document.getElementById('site-form-container');
  var formTitle = document.getElementById('site-form-title');
  var idInput = document.getElementById('site-id-input');
  var nameInput = document.getElementById('site-name-input');
  var abbrInput = document.getElementById('site-abbr-input');
  var statusInput = document.getElementById('site-status-input');
  var errEl = document.getElementById('site-form-error');

  function resetForm() {
    _editingId = null;
    formTitle.textContent = 'Create Site';
    idInput.value = '';
    idInput.disabled = false;
    nameInput.value = '';
    abbrInput.value = '';
    statusInput.value = 'active';
    statusInput.disabled = true; // New sites are always active
    errEl.textContent = '';
  }

  function openEditForm(siteId) {
    var site = _sites.find(function(s) { return s.site_id === siteId; });
    if (!site) return;
    
    _editingId = siteId;
    formTitle.textContent = 'Edit Site: ' + siteId;
    idInput.value = site.site_id;
    idInput.disabled = true;
    nameInput.value = site.site_name;
    abbrInput.value = site.site_abbr;
    statusInput.value = site.status;
    statusInput.disabled = false; // Existing sites can change status
    errEl.textContent = '';
    
    formContainer.classList.remove('d-none');
    nameInput.focus();
  }

  document.getElementById('site-show-form-btn').addEventListener('click', function () {
    resetForm();
    formContainer.classList.remove('d-none');
    idInput.focus();
  });

  document.getElementById('site-cancel-btn').addEventListener('click', function () {
    formContainer.classList.add('d-none');
    resetForm();
  });

  document.getElementById('site-submit-btn').addEventListener('click', function () {
    errEl.textContent = '';
    
    var data = {
      site_name: nameInput.value.trim(),
      site_abbr: abbrInput.value.trim()
    };
    
    var url, method;
    
    if (_editingId) {
      url = '/admin/api/sites/' + encodeURIComponent(_editingId);
      method = 'PUT';
      data.status = statusInput.value;
    } else {
      url = '/admin/api/sites';
      method = 'POST';
      data.site_id = idInput.value.trim().toUpperCase();
      if (!data.site_id) { errEl.textContent = 'Site ID is required.'; return; }
      if (data.site_id.length !== 4) { errEl.textContent = 'Site ID must be 4 characters.'; return; }
    }
    
    if (!data.site_name) { errEl.textContent = 'Name is required.'; return; }
    if (!data.site_abbr) { errEl.textContent = 'Abbreviation is required.'; return; }

    var btn = this;
    btn.disabled = true;
    apiJson(url, method, data).then(function (res) {
      btn.disabled = false;
      if (!res.ok) { errEl.textContent = res.data.error || 'Failed.'; return; }
      formContainer.classList.add('d-none');
      loadSites();
    }).catch(function () { 
      btn.disabled = false; 
      errEl.textContent = 'Network error.'; 
    });
  });

  // ── init ──────────────────────────────────────────────────────────────────

  loadSites();

}());
</script>
