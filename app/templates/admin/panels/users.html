{#
  User Management panel
  Lists all users with edit, create, and toggle capabilities.
#}
<div id="panel-users" data-languages="{{ available_languages | tojson | forceescape }}">

  {# Header #}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">
      <i class="fa-solid fa-users me-2 text-secondary"></i>Users
    </h5>
    <div class="d-flex gap-2 align-items-center">
      <div class="input-group input-group-sm" style="width: 250px;">
        <span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
        <input type="text" id="user-search-input" class="form-control" placeholder="Search name or email...">
      </div>
      <div class="form-check form-switch mb-0 ms-2">
        <input class="form-check-input" type="checkbox" id="user-show-inactive" role="switch">
        <label class="form-check-label small text-muted" for="user-show-inactive">Show inactive</label>
      </div>
      <button class="btn btn-sm btn-primary" id="user-show-form-btn">
        <i class="fa-solid fa-plus me-1"></i>New User
      </button>
    </div>
  </div>

  {# Inline form for create / edit #}
  <div id="user-form-container" class="card mb-4 d-none">
    <div class="card-body">
      <form id="user-form" autocomplete="off">
      <h6 class="card-title mb-3" id="user-form-title">Create User</h6>
      <div class="row g-2 align-items-start">
        <div class="col-sm-3">
          <label class="form-label small mb-1">Email <span class="text-danger">*</span></label>
          <input type="email" class="form-control form-control-sm" id="user-email-input" placeholder="user@example.com" autocomplete="email">
        </div>
        <div class="col-sm-3">
          <label class="form-label small mb-1">Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm" id="user-name-input" placeholder="Full Name" autocomplete="name">
        </div>
        <div class="col-sm-2">
          <label class="form-label small mb-1">Phone</label>
          <input type="tel" class="form-control form-control-sm" id="user-phone-input" placeholder="+1234567890" autocomplete="tel">
        </div>
        <div class="col-sm-2">
          <label class="form-label small mb-1" id="user-password-label">Password <span class="text-danger" id="user-password-asterisk">*</span></label>
          <input type="password" class="form-control form-control-sm" id="user-password-input" placeholder="••••••••" autocomplete="new-password">
          <div class="form-text" style="font-size: 0.7rem;" id="user-password-help"></div>
        </div>
        <div class="col-sm-2">
          <label class="form-label small mb-1">Status</label>
          <select class="form-select form-select-sm" id="user-status-input">
            <option value="active">Active</option>
            <option value="deactive">Inactive</option>
          </select>
        </div>
        <div class="col-sm-4">
          <label class="form-label small mb-1">VA Languages</label>
          <select class="form-select form-select-sm" id="user-languages-input" multiple style="width:100%"></select>
        </div>
      </div>
      <div class="row g-2 mt-1">
        <div class="col-12 d-flex justify-content-end gap-2">
          <button class="btn btn-sm btn-outline-secondary" id="user-cancel-btn">Cancel</button>
          <button class="btn btn-sm btn-success" id="user-submit-btn">
            <i class="fa-solid fa-check me-1"></i>Save
          </button>
        </div>
      </div>
      <div id="user-form-error" class="text-danger small mt-2"></div>
      </form>
    </div>
  </div>

  {# Toggle confirmation modal #}
  <div class="modal fade" id="user-toggle-modal" tabindex="-1" aria-labelledby="user-toggle-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title" id="user-toggle-modal-label"></h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body small py-3" id="user-toggle-modal-body"></div>
        <div class="modal-footer py-2">
          <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-sm btn-danger" id="user-toggle-confirm-btn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  {# Table — filled by JS #}
  <div id="user-table-wrap"></div>

</div>

<script src="{{ url_for('static', filename='js/admin/users_panel.js') }}"></script>
