<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block email_title %}DigitVA{% endblock %}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">

  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f6f9; padding: 32px 0;">
    <tr>
      <td align="center">

        <!-- Main card -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background-color: #0d6efd; padding: 28px 32px; text-align: center;">
              <h1 style="margin: 0; color: #ffffff; font-size: 24px; font-weight: 600; letter-spacing: 0.5px;">
                DigitVA
              </h1>
              <p style="margin: 4px 0 0 0; color: rgba(255,255,255,0.8); font-size: 13px;">
                VA Coding Platform
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding: 32px;">
              {% block email_body %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 24px 32px; border-top: 1px solid #e9ecef; text-align: center;">
              <p style="margin: 0 0 4px 0; color: #495057; font-size: 15px; font-weight: 600;">
                Thank You
              </p>
              <p style="margin: 0 0 2px 0; color: #6c757d; font-size: 13px;">
                DigitVA Team
              </p>
              <p style="margin: 0; color: #6c757d; font-size: 13px;">
                AIIMS, New Delhi
              </p>
            </td>
          </tr>

        </table>

        <!-- Subtle footer note -->
        <p style="margin: 16px 0 0 0; color: #adb5bd; font-size: 11px; text-align: center;">
          This is an automated message from the DigitVA platform. Please do not reply to this email.
        </p>

      </td>
    </tr>
  </table>

</body>
</html>
