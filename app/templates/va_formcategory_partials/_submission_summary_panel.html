{% if summary_items %}
  <div class="content-section-title mt-2">
    <i class="fas fa-file-alt"></i>
    Symptoms on VA Interview
  </div>
  <div class="table-responsive">
    <table class="table table-hover border">
      <thead class="table-light">
        <tr>
          <th class="border-bottom">Summary</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="align-middle">
            <div class="symptoms-container">
              {% for item in summary_items %}
                <span class="badge bg-light text-dark border me-1 mb-1 px-2 py-1">{{ item.strip() }}</span>
              {% endfor %}
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
{% endif %}
