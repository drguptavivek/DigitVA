<div class="card-header bg-primary text-white">
  <h5 class="mb-0 d-flex align-items-center">
    <i class="fas {{ category_config.icon_name or 'fa-stethoscope' }} me-2"></i>
    <span style="font-size: 1rem; font-weight: 600; letter-spacing: 0.5px">
      {{ category_config.display_label | upper }}
    </span>
  </h5>
</div>

<div class="card-body">
  {% include 'va_formcategory_partials/_va_cod_assessment_panel.html' %}

  <div class="card-footer d-flex justify-content-between mt-4">
    {% if va_previouscategory %}
      <button
        class="btn btn-secondary"
        hx-get="{{ url_for('va_form.renderpartial', va_sid=va_sid, va_partial=va_previouscategory, action=va_action, actiontype=va_actiontype) }}"
        hx-target="#form-content"
        hx-swap="innerHTML"
      >
        <i class="fas fa-arrow-left me-2"></i>Previous Category
      </button>
    {% else %}
      <span></span>
    {% endif %}
    <span></span>
  </div>
</div>
