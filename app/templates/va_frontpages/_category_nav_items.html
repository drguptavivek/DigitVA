{% for category in category_nav %}
  <button
    class="list-group-item list-group-item-action d-flex align-items-center{% if category.render_mode == 'table_sections' and 'symptoms' in category.category_code %} position-relative{% endif %}"
    hx-get="{{ url_for('va_form.renderpartial', va_sid=va_sid, va_partial=category.category_code, action=va_action, actiontype=va_actiontype) }}"
    hx-target="#form-content"
    hx-swap="innerHTML"
  >
    {% if category.render_mode == 'table_sections' and 'symptoms' in category.category_code %}
      <div class="symptom-tag"></div>
    {% endif %}
    <div class="button-main-content">
      <i class="fas {{ category.icon_name or 'fa-folder-open' }} me-2 text-primary"></i>
      <span>{{ category.nav_label }}</span>
    </div>
    {% if catcount and catcount.get(category.category_code, {}).get('count', 0) > 0 %}
      <span class="highlight-badge">{{ catcount.get(category.category_code, {}).get('count', 0) }}</span>
    {% endif %}
  </button>
{% endfor %}
