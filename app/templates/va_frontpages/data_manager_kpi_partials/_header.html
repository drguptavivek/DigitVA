{# Page header with title and time window selector #}
<div class="dm-kpi-header mb-4">
  <div class="row align-items-center">
    <div class="col">
      <h1 class="h3 mb-0">
        <i class="fa-solid fa-chart-line me-2 text-primary"></i>
        KPI Dashboard
      </h1>
      <p class="text-muted small mt-2 mb-0">Real-time metrics for your project and site operations</p>
    </div>
    <div class="col-auto">
      <div class="btn-group" role="group" aria-label="Time window">
        <button type="button" class="btn btn-sm btn-outline-primary" data-window="7">7 days</button>
        <button type="button" class="btn btn-sm btn-outline-primary" data-window="30">30 days</button>
        <button type="button" class="btn btn-sm btn-outline-primary" data-window="90">90 days</button>
      </div>
    </div>
  </div>
</div>
