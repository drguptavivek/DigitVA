<div class="modal fade" id="dm-upstream-changes-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h5 class="modal-title mb-1">Upstream Changed Fields</h5>
          <div class="small text-muted" id="dm-upstream-changes-modal-form-id"></div>
          <div class="small text-muted" id="dm-upstream-changes-modal-sid"></div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="dm-upstream-changes-modal-body">
        <div class="text-muted">Loading changed fields…</div>
      </div>
      <div class="modal-footer">
        <div class="w-100" id="dm-upstream-action-block">
          <div class="d-flex align-items-start gap-2 mb-2">
            <button type="button" class="btn btn-success btn-sm" id="dm-modal-accept-upstream-btn">
              Accept And Recode
            </button>
            <div class="small text-muted pt-1">
              Uses the new ODK data, clears old assigned ICD codes, and returns the form for recoding.
            </div>
          </div>
          <div class="d-flex align-items-start gap-2">
            <button type="button" class="btn btn-outline-danger btn-sm" id="dm-modal-reject-upstream-btn">
              Keep Current ICD Decision
            </button>
            <div class="small text-muted pt-1">
              Uses the new ODK data but keeps the current finalized ICD Code decision without reopening coding.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="dm-upstream-confirm-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="dm-upstream-confirm-title">Confirm Action</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="dm-upstream-confirm-body"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="dm-upstream-confirm-submit-btn">Confirm</button>
      </div>
    </div>
  </div>
</div>
