<div class="row g-3 mb-3" id="dm-kpi-row">
  <div class="col-4 col-sm-4 col-md-4">
    <div class="dm-kpi-card card-primary h-100" style="position:relative;">
      <button class="dm-kpi-info-btn" tabindex="-1"
              data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-placement="top"
              data-bs-content="All VA submissions synced from ODK, regardless of workflow state.">
        <i class="fa-solid fa-circle-info"></i>
      </button>
      <div class="dm-kpi-icon bg-primary text-white"><i class="fa-solid fa-file-alt"></i></div>
      <div>
        <div class="dm-kpi-value text-primary" id="kpi-total">—</div>
        <div class="dm-kpi-label">Total</div>
      </div>
    </div>
  </div>

  <div class="col-4 col-sm-4 col-md-4">
    <div class="dm-kpi-card clickable h-100" style="background:#fefce8;border-color:#fde047;position:relative;" id="kpi-pending-card">
      <button class="dm-kpi-info-btn" tabindex="-1"
              data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-placement="top"
              data-bs-content="Submissions awaiting a coding decision: ready_for_coding, smartva_pending, coding_in_progress, coder_step1_saved.">
        <i class="fa-solid fa-circle-info"></i>
      </button>
      <div class="dm-kpi-icon text-dark" style="background:#facc15;"><i class="fa-solid fa-clock"></i></div>
      <div>
        <div class="dm-kpi-value" style="color:#a16207;" id="kpi-pending">—</div>
        <div class="dm-kpi-label">Pending Coding</div>
      </div>
    </div>
  </div>

  <div class="col-4 col-sm-4 col-md-4">
    <div class="dm-kpi-card clickable h-100" style="background:#ecfeff;border-color:#a5f3fc;position:relative;" id="kpi-smartva-pending-card">
      <button class="dm-kpi-info-btn" tabindex="-1"
              data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-placement="top"
              data-bs-content="Submissions queued for automated SmartVA cause-of-death prediction before a human coder reviews them.">
        <i class="fa-solid fa-circle-info"></i>
      </button>
      <div class="dm-kpi-icon text-white" style="background:#0891b2;"><i class="fa-solid fa-robot"></i></div>
      <div>
        <div class="dm-kpi-value" style="color:#0e7490;" id="kpi-smartva-pending">—</div>
        <div class="dm-kpi-label">SmartVA Queue</div>
      </div>
    </div>
  </div>

  <div class="col-4 col-sm-4 col-md-4">
    <div class="dm-kpi-card clickable h-100" style="background:#ecfdf5;border-color:#a7f3d0;position:relative;" id="kpi-coded-card">
      <button class="dm-kpi-info-btn" tabindex="-1"
              data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-placement="top"
              data-bs-content="Submissions with a cause-of-death decision: coder_finalized, reviewer_eligible, reviewer_coding_in_progress, reviewer_finalized.">
        <i class="fa-solid fa-circle-info"></i>
      </button>
      <div class="dm-kpi-icon text-white" style="background:#059669;"><i class="fa-solid fa-check-circle"></i></div>
      <div>
        <div class="dm-kpi-value" style="color:#059669;" id="kpi-coded">—</div>
        <div class="dm-kpi-label">Coded</div>
      </div>
    </div>
  </div>

  <div class="col-4 col-sm-4 col-md-4">
    <div class="dm-kpi-card clickable h-100" style="background:#fdf4ff;border-color:#d8b4fe;position:relative;" id="kpi-revoked-card">
      <button class="dm-kpi-info-btn" tabindex="-1"
              data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-placement="top"
              data-bs-content="Submissions that were coded but then had their ODK source data updated. Requires data manager decision: accept (recode) or reject (restore prior COD).">
        <i class="fa-solid fa-circle-info"></i>
      </button>
      <div class="dm-kpi-icon text-white" style="background:#9333ea;"><i class="fa-solid fa-rotate-left"></i></div>
      <div>
        <div class="dm-kpi-value" style="color:#9333ea;" id="kpi-revoked">—</div>
        <div class="dm-kpi-label">Upstream Changed</div>
      </div>
    </div>
  </div>

  <div class="col-4 col-sm-4 col-md-4">
    <div class="dm-kpi-card card-warning clickable h-100" id="kpi-odk-issues-card" style="position:relative;">
      <button class="dm-kpi-info-btn" tabindex="-1"
              data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-placement="top"
              data-bs-content="Submissions the data collector flagged in ODK Central as having problems (reviewState = hasIssues). The field team needs to resolve or clarify the issue before the form can be coded.">
        <i class="fa-solid fa-circle-info"></i>
      </button>
      <div class="dm-kpi-icon bg-warning text-dark"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div>
        <div class="dm-kpi-value text-warning" id="kpi-odk-issues">—</div>
        <div class="dm-kpi-label">Needs Field Attention</div>
      </div>
    </div>
  </div>

  <div class="col-4 col-sm-4 col-md-4">
    <div class="dm-kpi-card card-danger clickable h-100" id="kpi-flagged-card" style="position:relative;">
      <button class="dm-kpi-info-btn" tabindex="-1"
              data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-placement="top"
              data-bs-content="Submissions the data manager has determined cannot be coded — e.g. the VA interview was too incomplete, the death did not qualify, or data quality was insufficient. These are excluded from the coding queue.">
        <i class="fa-solid fa-circle-info"></i>
      </button>
      <div class="dm-kpi-icon bg-danger text-white"><i class="fa-solid fa-flag"></i></div>
      <div>
        <div class="dm-kpi-value text-danger" id="kpi-flagged">—</div>
        <div class="dm-kpi-label">Not Codeable (DM)</div>
      </div>
    </div>
  </div>

  <div class="col-4 col-sm-4 col-md-4">
    <div class="dm-kpi-card clickable h-100" style="background:#fff7ed;border-color:#fdba74;position:relative;" id="kpi-consent-refused-card">
      <button class="dm-kpi-info-btn" tabindex="-1"
              data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-placement="top"
              data-bs-content="Submissions where the family declined to participate in the verbal autopsy interview. These cannot be coded.">
        <i class="fa-solid fa-circle-info"></i>
      </button>
      <div class="dm-kpi-icon text-white" style="background:#ea580c;"><i class="fa-solid fa-ban"></i></div>
      <div>
        <div class="dm-kpi-value" style="color:#ea580c;" id="kpi-consent-refused">—</div>
        <div class="dm-kpi-label">Consent Refused</div>
      </div>
    </div>
  </div>

  <div class="col-4 col-sm-4 col-md-4">
    <div class="dm-kpi-card card-secondary clickable h-100" id="kpi-smartva-missing-card" style="position:relative;">
      <button class="dm-kpi-info-btn" tabindex="-1"
              data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-placement="top"
              data-bs-content="Submissions that do not yet have a SmartVA prediction output on disk. These may need a SmartVA processing run.">
        <i class="fa-solid fa-circle-info"></i>
      </button>
      <div class="dm-kpi-icon bg-secondary text-white"><i class="fa-solid fa-brain"></i></div>
      <div>
        <div class="dm-kpi-value" id="kpi-smartva-missing">—</div>
        <div class="dm-kpi-label">SmartVA Missing</div>
      </div>
    </div>
  </div>
</div>
