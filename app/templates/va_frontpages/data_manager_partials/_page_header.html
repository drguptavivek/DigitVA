<div class="dm-page-header">
  <div>
    <h4 class="mb-0 fw-semibold">
      <i class="fa-solid fa-database text-primary me-2"></i>Data Management
    </h4>
    <small class="text-muted">{{ current_user.email }}</small>
  </div>
  <div class="d-flex gap-2 flex-wrap">
    <a class="btn btn-sm btn-outline-primary"
       href="{{ url_for('data_management.user_management') }}">
      <i class="fa-solid fa-users me-1"></i>Manage Users
    </a>
    <button class="btn btn-sm btn-outline-secondary"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#dm-filter-offcanvas">
      <i class="fa-solid fa-filter me-1"></i>Filters
    </button>
    <button class="btn btn-sm btn-outline-secondary"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#dm-ops-offcanvas">
      <i class="fa-solid fa-gear me-1"></i>Operations
    </button>
    <button id="dm-refresh-dashboard-btn" class="btn btn-sm btn-outline-primary" type="button">
      <i class="fa-solid fa-arrows-rotate me-1"></i>Refresh Dashboard
    </button>
    <div class="dropdown">
      <button class="btn btn-sm btn-outline-success dropdown-toggle"
              type="button"
              id="dm-export-dropdown-btn"
              data-bs-toggle="dropdown"
              aria-expanded="false">
        <i class="fa-solid fa-file-export me-1"></i>Export
      </button>
      <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dm-export-dropdown-btn">
        <li>
          <button class="dropdown-item dm-export-btn" type="button" data-export-kind="data">
            <i class="fa-solid fa-table me-2"></i>Export Data
          </button>
        </li>
        <li>
          <button class="dropdown-item dm-export-btn" type="button" data-export-kind="smartva_input">
            <i class="fa-solid fa-file-lines me-2"></i>SmartVA Input Data
          </button>
        </li>
        <li>
          <button class="dropdown-item dm-export-btn" type="button" data-export-kind="smartva_results">
            <i class="fa-solid fa-chart-column me-2"></i>Results
          </button>
        </li>
        <li>
          <button class="dropdown-item dm-export-btn" type="button" data-export-kind="smartva_likelihoods">
            <i class="fa-solid fa-percent me-2"></i>Likelihoods
          </button>
        </li>
      </ul>
    </div>
  </div>
</div>
