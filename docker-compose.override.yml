services:
  minerva_app_service:
    environment:
      - FLASK_DEBUG=1
      - FLASK_ENV=development
    entrypoint: []
    command: >
      bash -c "
        echo 'Waiting for database...' &&
        until uv run flask db upgrade; do
          echo 'DB not ready, retrying in 5s...'
          sleep 5
        done &&
        uv run flask run --host=0.0.0.0 --port=5000
      "
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
