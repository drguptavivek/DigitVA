services:
  minerva_app_service:
    build: .
    container_name: minerva_app
    command: ./boot.sh
    volumes:
      - .:/app
      - minerva_venv:/app/.venv
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@minerva_db_service:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@minerva_redis_service:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@minerva_redis_service:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@minerva_redis_service:6379/0
    depends_on:
      - minerva_db_service
      - minerva_redis_service
    restart: always
    deploy:
      resources:
        limits:
          memory: 756m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 20s

  minerva_celery_worker:
    build: .
    container_name: minerva_celery_worker
    entrypoint: []
    command: celery -A make_celery:celery_app worker --loglevel=info --concurrency=1
    volumes:
      - .:/app
      - minerva_venv:/app/.venv
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@minerva_db_service:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@minerva_redis_service:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@minerva_redis_service:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@minerva_redis_service:6379/0
    depends_on:
      minerva_app_service:
        condition: service_healthy
      minerva_db_service:
        condition: service_healthy
      minerva_redis_service:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 1536m
        reservations:
          memory: 400m

  minerva_celery_beat:
    build: .
    container_name: minerva_celery_beat
    entrypoint: []
    command: bash ./scripts/wait-for-celery-beat-db.sh
    volumes:
      - .:/app
      - minerva_venv:/app/.venv
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@minerva_db_service:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@minerva_redis_service:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@minerva_redis_service:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@minerva_redis_service:6379/0
    depends_on:
      minerva_app_service:
        condition: service_healthy
      minerva_db_service:
        condition: service_healthy
      minerva_redis_service:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 192m

  minerva_redis_service:
    image: redis:7
    container_name: minerva_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: always
    deploy:
      resources:
        limits:
          memory: 96m
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minerva_db_service:
    image: postgres:17
    container_name: minerva_db
    # Tuned for 1.87 GB host with 183 MB database and ≤24 application connections.
    # shared_buffers=128MB keeps entire DB hot in cache (DB is 183MB).
    # max_connections=40 matches pool headroom (3 services × 8 max = 24 + 16 admin margin).
    # idle_in_transaction_session_timeout kills hung transactions after 30s.
    # tcp_keepalives_idle detects dead connections within 60s.
    # log_min_duration_statement logs queries slower than 1s for performance diagnosis.
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c max_connections=40
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=8MB
      -c checkpoint_completion_target=0.9
      -c idle_in_transaction_session_timeout=30000
      -c log_min_duration_statement=1000
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_minerva:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 756m
        reservations:
          memory: 386m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minerva"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata_minerva:
  minerva_venv:
