services:
  minerva_app_service:
    build: .
    platform: linux/amd64
    container_name: minerva_app
    command: ./boot.sh
    volumes:
      - .:/app
      - venv_app:/app/.venv
    ports:
      - "8050:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@minerva_db_service:5432/${POSTGRES_DB}
      - REDIS_URL=redis://minerva_redis_service:6379/0
      - CELERY_BROKER_URL=redis://minerva_redis_service:6379/0
      - CELERY_RESULT_BACKEND=redis://minerva_redis_service:6379/0
    depends_on:
      - minerva_db_service
      - minerva_redis_service
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  minerva_celery_worker:
    build: .
    platform: linux/amd64
    container_name: minerva_celery_worker
    entrypoint: []
    command: uv run celery -A make_celery:celery_app worker --loglevel=info
    volumes:
      - .:/app
      - venv_worker:/app/.venv
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@minerva_db_service:5432/${POSTGRES_DB}
      - REDIS_URL=redis://minerva_redis_service:6379/0
      - CELERY_BROKER_URL=redis://minerva_redis_service:6379/0
      - CELERY_RESULT_BACKEND=redis://minerva_redis_service:6379/0
    depends_on:
      - minerva_db_service
      - minerva_redis_service
    restart: always

  minerva_celery_beat:
    build: .
    container_name: minerva_celery_beat
    entrypoint: []
    command: bash -c "sleep 10 && uv run celery -A make_celery:celery_app beat --loglevel=info -S sqlalchemy_celery_beat.schedulers:DatabaseScheduler"
    volumes:
      - .:/app
      - venv_beat:/app/.venv
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@minerva_db_service:5432/${POSTGRES_DB}
      - REDIS_URL=redis://minerva_redis_service:6379/0
      - CELERY_BROKER_URL=redis://minerva_redis_service:6379/0
      - CELERY_RESULT_BACKEND=redis://minerva_redis_service:6379/0
    depends_on:
      - minerva_db_service
      - minerva_redis_service
      - minerva_app_service
    restart: always

  minerva_redis_service:
    image: redis:7
    container_name: minerva_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minerva_db_service:
    image: postgres:17
    container_name: minerva_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_minerva:/var/lib/postgresql/data
    ports:
      - "8450:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minerva"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata_minerva:
  venv_app:
  venv_worker:
  venv_beat:
